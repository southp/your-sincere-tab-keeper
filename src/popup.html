<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="popupTitle">Your Sincere Tab Keeper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="logo">
        <div class="tab-icon">📑</div>
        <h1 data-i18n="popupTitle">Your Sincere Tab Keeper</h1>
      </div>
      <div class="tagline" data-i18n="popupTagline">Living your best tab life, one maze at a time</div>
    </header>

    <main class="popup-content">
      <div class="status-section">
        <div class="current-limit">
          <span class="label" data-i18n="currentTabLimit">Current Tab Limit:</span>
          <span class="limit-value" id="currentLimit">5</span>
        </div>
        <div class="tab-count">
          <span class="label" data-i18n="openTabs">Open Tabs:</span>
          <span class="count-value" id="tabCount">-</span>
        </div>
      </div>

      <section class="stats-preview" aria-labelledby="stats-heading">
        <h2 id="stats-heading" class="sr-only">Statistics Summary</h2>
        <article class="stat-item">
          <span class="stat-number" id="mazesCompleted">0</span>
          <span class="stat-label" data-i18n="mazesSolved">Mazes Solved</span>
        </article>
        <article class="stat-item">
          <span class="stat-number" id="blockedAttempts">0</span>
          <span class="stat-label" data-i18n="tabsBlocked">Tabs Blocked</span>
        </article>
      </section>

      <nav class="actions" aria-label="Main actions">
        <button id="updateLimitBtn" class="primary-btn">
          <span class="btn-icon" aria-hidden="true">🧩</span>
          <span data-i18n="updateTabLimit">Update Tab Limit</span>
        </button>
        <button id="viewStatsBtn" class="secondary-btn">
          <span class="btn-icon" aria-hidden="true">📊</span>
          <span data-i18n="viewFullStats">View Full Stats</span>
        </button>
      </nav>

      <aside class="maze-status" id="mazeStatus" role="alert" aria-live="assertive" style="display: none;">
        <div class="maze-alert">
          <span class="alert-icon" aria-hidden="true">🎯</span>
          <span class="alert-text" data-i18n="youHaveAMazeToSolve">You have a maze to solve!</span>
        </div>
      </aside>
    </main>

    <footer class="popup-footer">
      <div class="tip" id="dailyTip">
        💡 Tip: Close unused tabs to stay focused!
      </div>
    </footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
