<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Sincere Tab Keeper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .blob-container {
            text-align: center;
            animation: fadeIn 0.5s ease-in-out;
        }
        
        .blob {
            width: 200px;
            height: 200px;
            background: #ff6b6b;
            border-radius: 50% 40% 60% 30%;
            margin: 0 auto 30px;
            position: relative;
            animation: blobFloat 3s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
        }
        
        .blob::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50% 30% 40% 60%;
            animation: blobPulse 2s ease-in-out infinite;
        }
        
        .blob-face {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }
        
        .eyes {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            justify-content: center;
        }
        
        .eye {
            width: 20px;
            height: 20px;
            background: #333;
            border-radius: 50%;
            animation: blink 4s infinite;
        }
        
        .mouth {
            width: 40px;
            height: 20px;
            border: 3px solid #333;
            border-top: none;
            border-radius: 0 0 40px 40px;
            margin: 0 auto;
        }
        
        .message {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
        }
        
        .message h1 {
            color: #ff6b6b;
            font-size: 2.2em;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .message p {
            font-size: 1.3em;
            line-height: 1.6;
            color: #555;
            margin-bottom: 20px;
        }
        
        .emoji {
            font-size: 2em;
            margin: 0 10px;
            animation: bounce 2s infinite;
        }
        
        .close-timer {
            font-size: 0.9em;
            color: #888;
            margin-top: 15px;
            font-style: italic;
        }
        
        .maze-hint {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: white;
            padding: 16px 24px;
            border-radius: 20px;
            margin-top: 25px;
            font-weight: 700;
            font-size: 1.4em;
            text-align: center;
            letter-spacing: 0.3px;
            line-height: 1.3;
            box-shadow: 0 8px 25px rgba(68, 160, 141, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }
        
        .maze-hint:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(68, 160, 141, 0.5);
        }
        
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes blobFloat {
            0%, 100% { 
                transform: translateY(0) rotate(0deg);
                border-radius: 50% 40% 60% 30%;
            }
            25% { 
                transform: translateY(-20px) rotate(5deg);
                border-radius: 40% 60% 30% 50%;
            }
            50% { 
                transform: translateY(-10px) rotate(-5deg);
                border-radius: 60% 30% 50% 40%;
            }
            75% { 
                transform: translateY(-25px) rotate(3deg);
                border-radius: 30% 50% 40% 60%;
            }
        }
        
        @keyframes blobPulse {
            0%, 100% { 
                opacity: 0.2;
                transform: translate(-50%, -50%) scale(1);
            }
            50% { 
                opacity: 0.4;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }
        
        @keyframes blink {
            0%, 45%, 55%, 100% { height: 20px; }
            50% { height: 2px; }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* Floating particles */
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .particle:nth-child(1) {
            width: 6px;
            height: 6px;
            top: 20%;
            left: 10%;
            animation: float1 6s infinite ease-in-out;
        }
        
        .particle:nth-child(2) {
            width: 8px;
            height: 8px;
            top: 60%;
            right: 15%;
            animation: float2 8s infinite ease-in-out;
        }
        
        .particle:nth-child(3) {
            width: 4px;
            height: 4px;
            bottom: 30%;
            left: 20%;
            animation: float3 7s infinite ease-in-out;
        }
        
        @keyframes float1 {
            0%, 100% { transform: translateY(0) translateX(0); }
            33% { transform: translateY(-20px) translateX(10px); }
            66% { transform: translateY(10px) translateX(-5px); }
        }
        
        @keyframes float2 {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-30px) translateX(-15px); }
        }
        
        @keyframes float3 {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-15px) translateX(20px); }
            75% { transform: translateY(5px) translateX(-10px); }
        }
    </style>
</head>
<body>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    
    <div class="blob-container">
        <div class="blob">
            <div class="blob-face">
                <div class="eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <div class="mouth"></div>
            </div>
        </div>
        
        <div class="message">
            <h1>Whoa there! <span class="emoji">🧩</span></h1>
            <p>
                You already have a maze to solve!
                <br>
                <strong>Focus on that one first.</strong>
            </p>
            
            <div class="maze-hint">
                Complete your current maze first!
            </div>
            
            <div class="close-timer">
                This tab will close in <span id="countdown">6</span> seconds...
            </div>
        </div>
    </div>

    <script src="blob.js"></script>
</body>
</html>
