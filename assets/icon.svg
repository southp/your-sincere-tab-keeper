<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </radialGradient>
    
    <linearGradient id="tabGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="mazeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Main background -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGradient)" filter="url(#dropShadow)"/>
  
  <!-- Browser tabs representation -->
  <g transform="translate(20, 25)">
    <!-- Tab 1 - Active/controlled -->
    <rect x="0" y="0" width="24" height="18" rx="3" fill="url(#tabGradient)" stroke="#cbd5e1" stroke-width="1"/>
    <circle cx="20" cy="9" r="2" fill="#10b981"/>
    
    <!-- Tab 2 -->
    <rect x="22" y="0" width="24" height="18" rx="3" fill="url(#tabGradient)" stroke="#cbd5e1" stroke-width="1"/>
    <circle cx="42" cy="9" r="2" fill="#10b981"/>
    
    <!-- Tab 3 -->
    <rect x="44" y="0" width="24" height="18" rx="3" fill="url(#tabGradient)" stroke="#cbd5e1" stroke-width="1"/>
    <circle cx="64" cy="9" r="2" fill="#10b981"/>
    
    <!-- New tab with maze symbol -->
    <rect x="66" y="0" width="20" height="18" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="76" y="13" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" fill="#d97706">⚡</text>
  </g>
  
  <!-- Central maze/puzzle element -->
  <g transform="translate(34, 50)">
    <!-- Simplified maze pattern -->
    <rect x="0" y="0" width="60" height="48" rx="6" fill="url(#mazeGradient)" filter="url(#dropShadow)"/>
    
    <!-- Maze paths (white lines) -->
    <g stroke="#ffffff" stroke-width="2" fill="none" opacity="0.9">
      <!-- Horizontal paths -->
      <line x1="8" y1="12" x2="24" y2="12"/>
      <line x1="32" y1="12" x2="52" y2="12"/>
      <line x1="8" y1="24" x2="16" y2="24"/>
      <line x1="24" y1="24" x2="40" y2="24"/>
      <line x1="48" y1="24" x2="52" y2="24"/>
      <line x1="16" y1="36" x2="36" y2="36"/>
      <line x1="44" y1="36" x2="52" y2="36"/>
      
      <!-- Vertical paths -->
      <line x1="12" y1="8" x2="12" y2="16"/>
      <line x1="20" y1="16" x2="20" y2="28"/>
      <line x1="36" y1="8" x2="36" y2="20"/>
      <line x1="48" y1="16" x2="48" y2="40"/>
      <line x1="28" y1="28" x2="28" y2="40"/>
    </g>
    
    <!-- Player dot (start) -->
    <circle cx="12" cy="12" r="3" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
    
    <!-- Goal (finish) -->
    <rect x="46" y="34" width="6" height="6" rx="1" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
  </g>
  
  <!-- Subtle "keeper" shield element -->
  <g transform="translate(88, 20)">
    <path d="M0 8 Q0 0 8 0 Q16 0 16 8 L16 16 Q16 20 12 22 L8 24 L4 22 Q0 20 0 16 Z" 
          fill="#ffffff" fill-opacity="0.3" stroke="#ffffff" stroke-width="1"/>
    <text x="8" y="15" font-family="serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff">✓</text>
  </g>
  
  <!-- Small decorative elements -->
  <circle cx="24" cy="108" r="2" fill="#ffffff" fill-opacity="0.4"/>
  <circle cx="104" cy="100" r="2" fill="#ffffff" fill-opacity="0.4"/>
  <circle cx="108" cy="88" r="1.5" fill="#ffffff" fill-opacity="0.3"/>
</svg>