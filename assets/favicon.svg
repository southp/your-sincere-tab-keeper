<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </radialGradient>
    
    <linearGradient id="mazeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#bgGradient)"/>
  
  <!-- Simple maze representation -->
  <rect x="6" y="8" width="20" height="16" rx="2" fill="url(#mazeGradient)"/>
  
  <!-- Maze paths (simplified) -->
  <g stroke="#ffffff" stroke-width="1" fill="none" opacity="0.9">
    <line x1="8" y1="12" x2="14" y2="12"/>
    <line x1="18" y1="12" x2="24" y2="12"/>
    <line x1="8" y1="20" x2="12" y2="20"/>
    <line x1="16" y1="20" x2="24" y2="20"/>
    <line x1="10" y1="10" x2="10" y2="14"/>
    <line x1="20" y1="14" x2="20" y2="22"/>
  </g>
  
  <!-- Player and goal -->
  <circle cx="10" cy="12" r="1.5" fill="#fbbf24"/>
  <rect x="21" y="19" width="2" height="2" rx="0.5" fill="#fbbf24"/>
</svg>